<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Browser Fixture Watch Page</title>
    <!-- fixtureではfaviconアセットを持たない -->
    <link rel="icon" href="data:," />
    <link rel="shortcut icon" href="data:," />
  </head>
  <body>
    <div id="root">
      <div>
        <main>
          <div class="grid-area_[player]">
            <div class="PlayerPresenter">
              <div>
                <div>
                  <div data-scope="menu">
                    <button data-scope="tooltip" data-part="trigger" aria-label="コメントを表示する">
                      コメント
                    </button>
                    <button data-scope="tooltip" data-part="trigger" aria-label="全画面表示する">
                      全画面
                    </button>
                    <div data-name="content">
                      <video muted></video>
                    </div>
                    <div data-name="comment">
                      <canvas width="1280" height="720"></canvas>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script>
      (() => {
        const fullscreenToggleButton = globalThis.document.querySelector(
          'button[data-scope="tooltip"][data-part="trigger"][aria-label="全画面表示する"]',
        );
        if (!(fullscreenToggleButton instanceof HTMLButtonElement)) return;

        fullscreenToggleButton.addEventListener("click", () => {
          const currentLabel = fullscreenToggleButton.getAttribute("aria-label");
          const nextLabel = currentLabel === "全画面表示を終了"
            ? "全画面表示する"
            : "全画面表示を終了";
          fullscreenToggleButton.setAttribute("aria-label", nextLabel);
        });
      })();
    </script>
  </body>
</html>
